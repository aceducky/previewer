<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }
      body {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: 4rem 1fr;
        font-family: Arial, Helvetica, sans-serif;
      }
      #header {
        display: flex;
        align-content: space-around;
        justify-content: space-between;
        font-size: large;
        border-bottom: solid 1px black;
        background-color: #3e4446;
        color: white;
        padding: 10px;
        flex-wrap: wrap;
      }
      #wrapper {
        display: grid;
        grid-template-columns: 6fr 6fr;
      }
      button {
        padding: 2px;
        border: none;
        border-bottom: ridge #51585a;
        border-radius: 2px;
        margin: 5px;
        font-weight: bold;
        cursor: pointer;
        color: white;
        background-color: transparent;
      }
      #new-btn {
        margin-left: 2%;
      }
      #new-btn:hover {
        background-color: rgb(0, 115, 255);
      }
      #save-btn:hover {
        background-color: rgb(16, 181, 16);
      }
      #rename-btn:hover {
        background-color: darkblue;
      }
      #delete-btn:hover {
        background-color: rgb(192, 43, 23);
      }
      #button-wrapper {
        flex-grow: 4;
        flex-shrink: 2;
      }
      #width-input {
        margin-right: 0.5rem;
        width: 30vw;
      }
      #saved-list {
        max-width: 15rem;
        height: 1.5rem;
        text-align: left;
      }
      textarea {
        width: 100%;
        height: 100%;
        resize: none;
        background-color: #60686cea;
        padding: 10px;
        line-height: 1.2rem;
        font-size: large;
        outline: none;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 1px solid rgb(109, 108, 108);
      }
      ::placeholder {
        color: white;
      }
      @media only screen and (max-width: 400px) {
        body {
          grid-template-rows: 7rem 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div id="header">
      <h4>Html Previewer</h4>
      <div id="button-wrapper">
        <button id="new-btn">New</button>
        <button id="save-btn">Save</button>
        <button id="rename-btn">Rename</button>
        <button id="delete-btn">Delete</button>
      </div>
      <label id="width-wrapper" for="width-input"
        ><input
          type="range"
          id="width-input"
          min="0"
          max="12"
          value="6"
          title="Resize width"
          step="any"
      /></label>
      <label for="saved-list">
        <select name="" id="saved-list">
          <option>Select Code</option>
        </select>
      </label>
    </div>
    <div id="wrapper">
      <textarea id="code-input" placeholder="Write your code here"></textarea>
      <iframe id="output" frameborder="0"></iframe>
    </div>
    <script src="script.js"></script>
  </body>
</html>
