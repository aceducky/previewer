<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Preview</title>
    <style>
      * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
      }

      body {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-rows: 3rem 1fr;
        font-family: Arial, Helvetica, sans-serif;
      }

      #header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: large;
        border-bottom: solid 1px black;
        background-color: #3e4446;
        color: white;
        padding: 10px;
      }
      #wrapper {
        display: grid;
        grid-template-columns: 6fr 6fr;
      }

      button {
        padding: 2px;
        border: none;
        border-bottom: ridge #51585a;
        border-radius: 2px;
        margin-right: 10px;
        font-weight: bold;
        cursor: pointer;
        color: white;
        background-color: transparent;
      }
      #new-btn:hover {
        background-color: rgb(0, 115, 255);
      }
      #save-btn:hover {
        background-color: rgb(16, 181, 16);
      }
      #delete-btn:hover {
        background-color: rgb(192, 43, 23);
      }
      #saved-list {
        max-width: 10rem;
        min-width: 3rem;
        height: 1.5rem;
      }
      textarea {
        width: 100%;
        height: 100%;
        resize: none;
        background-color: #60686cea;
        padding: 10px;
        line-height: 1.2rem;
        font-size: large;
        outline: none;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 1px solid rgb(109, 108, 108);
      }
      ::placeholder {
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="header">
      <div>
        <span>Html Previewer </span>
        <button id="new-btn">New</button>
        <button id="save-btn">Save</button>
        <button id="delete-btn">Delete</button>
      </div>
      <label for="saved-list">
        Saved code
        <select name="" id="saved-list">
          <!-- <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option> -->
        </select>
      </label>
      <label for="width-input"
        ><input
          type="range"
          id="width-input"
          min="0"
          max="12"
          value="6"
          title="Resize width"
      /></label>
    </div>
    <div id="wrapper">
      <textarea id="code-input" placeholder="Write your code here"></textarea>
      <iframe id="output" frameborder="0"></iframe>
    </div>
    <script>
      let codeInput = document.querySelector("#code-input");
      let output = document.querySelector("#output");
      let wrapper = document.querySelector("#wrapper");
      let widthInput = document.querySelector("#width-input");
      let newBtn = document.querySelector("#new-btn");
      let saveBTn = document.querySelector("#save-btn");
      let deleteBtn = document.querySelector("#delete-btn");
      let codes = new Map();
      let savedList = document.querySelector("#saved-list");
      let selectedOption;
      let currentOption;

      widthInput.addEventListener("input", () => {
        if (widthInput.value == widthInput.max) {
          wrapper.style.gridTemplateRows = "1fr 1fr";
          wrapper.style.gridTemplateColumns = "none";
          return;
        }

        wrapper.style.gridTemplateColumns = `${widthInput.value}fr ${
          12 - widthInput.value
        }fr`;
        wrapper.style.gridTemplateRows = "none";
      });

      function run() {
        output.src =
          "data:text/html;charset=utf-8," + encodeURI(codeInput.value);
      }

      codeInput.addEventListener("input", run);

      newBtn.addEventListener("click", () => {
        codeInput.value = "";
        currentOption = null;
        savedList.value = currentOption;
        run();
      });

      saveBTn.addEventListener("click", () => {
        if (codeInput.value.trim() == "") {
          return;
        }
        if (currentOption) {
          currentOption.value = codeInput.value;
          codes.set(currentOption.text, codeInput.value);
          console.log(codes);
          return;
        }
        let name;
        let validated = false;
        while (!validated) {
          name = prompt(
            "Enter valid name: \nPress Esc or cancel to cancel the action"
          );
          switch (true) {
            case name == null:
              alert("Code is not saved!");
              return;
            case name.trim() == "":
              currentOption: any;
              break;
            case codes.has(name.trim()):
              alert("Name already exists");
              break;
            default:
              validated = true;
              break;
          }
          name = name.trim();
          savedList.value = name;
          codes.set(name, codeInput.value);
          let option = document.createElement("option");
          option.text = name;
          option.value = codeInput.value;
          savedList.add(option);
          savedList.value = name;
          currentOption = option;
        }
        console.log(currentOption.value, currentOption.text);
      });

      savedList.addEventListener("input", () => {
        selectedOption = savedList.options[savedList.selectedIndex];
        codeInput.value = selectedOption.value;
        run();
        currentOption = selectedOption;
      });

      deleteBtn.addEventListener("click", () => {
        if (currentOption) {
          let confirmDelete = confirm("Delete the code?");
          if (confirmDelete == true) {
            codeInput.value = "";
            savedList.value = null;
            console.log(savedList.value);
            savedList.remove(currentOption.text);
            codes.delete(currentOption.text);
            alert("Deleted");
            run();
          }
        }
      });
    </script>
  </body>
</html>
